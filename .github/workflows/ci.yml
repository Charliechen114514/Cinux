name: Cinux CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Install clang-format
        run: sudo apt-get install -y clang-format

      - name: Format code
        run: |
          find kernel user test boot \
            \( -name '*.cpp' -o -name '*.hpp' -o -name '*.c' -o -name '*.h' \) \
            -exec clang-format -i {} +

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'style: auto-format with clang-format'

  host-tests:
    needs: format
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Install GCC 14
        run: |
          sudo apt-get install -y gcc-14 g++-14
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-14 100
          echo "GCC version: $(gcc --version | head -1)"

      - name: Install CMake
        run: |
          pip install cmake
          echo "CMake version: $(cmake --version | head -1)"

      - name: Install dependencies
        run: sudo apt-get install -y qemu-system-x86 e2fsprogs python3

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCINUX_BUILD_TESTS=ON -S .

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run host tests
        working-directory: build
        run: make test_host

  kernel-tests:
    needs: format
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Install GCC 14
        run: |
          sudo apt-get install -y gcc-14 g++-14
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-14 100
          echo "GCC version: $(gcc --version | head -1)"

      - name: Install CMake
        run: |
          pip install cmake
          echo "CMake version: $(cmake --version | head -1)"

      - name: Install dependencies
        run: sudo apt-get install -y qemu-system-x86 e2fsprogs python3

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCINUX_BUILD_TESTS=ON -S .

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run kernel tests
        working-directory: build
        run: make run-kernel-test
